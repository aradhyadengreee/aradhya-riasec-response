{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h3>Select Your Interest Clusters</h3>
                <p class="text-muted">Choose at least 3 and up to 5 interest clusters that match your preferences</p>
            </div>
            <div class="card-body">
                <form id="interestsForm">
                    <div class="row">
                        {% for interest in interest_clusters %}
                        <div class="col-md-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="{{ interest }}" 
                                       id="interest{{ loop.index }}" name="interests">
                                <label class="form-check-label" for="interest{{ loop.index }}">
                                    {{ interest }}
                                </label>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Continue to RIASEC Assessment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('interestsForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const selectedInterests = Array.from(document.querySelectorAll('input[name="interests"]:checked'))
        .map(checkbox => checkbox.value);
    
    if (selectedInterests.length < 3) {
        alert('Please select at least 3 interest clusters');
        return;
    }
    
    if (selectedInterests.length > 5) {
        alert('Please select at most 5 interest clusters');
        return;
    }
    
    try {
        const response = await fetch('/api/user/update-interests', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ interests: selectedInterests })
        });
        
        const result = await response.json();
        
        if (result.success) {
            window.location.href = '/assessment';
        } else {
            alert('Error: ' + result.error);
        }
    } catch (error) {
        alert('Error updating interests: ' + error.message);
    }
});
</script>
{% endblock %}
